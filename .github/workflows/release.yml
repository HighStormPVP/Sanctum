# Build Sanctum for Windows + macOS on every tagged release.
#
# Trigger: push a git tag matching `v*` (e.g. `v0.1.0`, `v0.2.0-beta1`).
# Output: a GitHub Release with `Sanctum-<version>.dmg` (universal, Intel + Apple Silicon)
#         and `Sanctum Setup <version>.exe` attached.
#
# No Mac required — GitHub provides macOS runners. The DMG is built unsigned;
# users will see Gatekeeper's "unidentified developer" warning on first launch
# until you set up Apple Developer ID signing (see notes at the bottom).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # also allow manual runs from the Actions UI

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  build:
    name: Build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: dist/*.dmg
            build_cmd: dist:mac
          - os: windows-latest
            artifact_glob: dist/*.exe
            build_cmd: dist:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.build_cmd }})
        env:
          # electron-builder needs this to know it shouldn't try to publish
          # (we upload manually below for clarity).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.build_cmd }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sanctum-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \) -exec cp {} release/ \;
          ls -lah release

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# -----------------------------------------------------------------------------
# Notes
#
# 1. UNSIGNED MAC DMG
#    The DMG produced by this workflow isn't signed or notarized, so on first
#    launch macOS will block it with "Sanctum can't be opened because Apple
#    cannot check it for malicious software." Users right-click → Open to
#    bypass once. To eliminate this warning, you need an Apple Developer ID
#    ($99/year). Then add these secrets to your GitHub repo:
#      - MAC_CERTS         (base64 of your .p12 keychain export)
#      - MAC_CERTS_PASSWORD
#      - APPLE_ID
#      - APPLE_ID_PASSWORD (an app-specific password from appleid.apple.com)
#      - APPLE_TEAM_ID
#    And in the macOS step, drop CSC_IDENTITY_AUTO_DISCOVERY: 'false' so
#    electron-builder picks them up automatically.
#
# 2. UNSIGNED WINDOWS INSTALLER
#    Same idea for Windows — SmartScreen will flag the .exe until you sign it
#    with a code-signing certificate. Not free (~$200/year) but optional.
#
# 3. ICON
#    The build expects assets/icon.icns (Mac), assets/icon.ico (Win),
#    assets/icon.png (Linux). If any are missing, electron-builder falls back
#    to a default Electron icon — fine for testing, not great for shipping.
